services:
  onibusexpress-api:
    container_name: onibusexpress-api

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080

      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;
        Database=OnibusExpressDb;
        User Id=sa;
        Password=SuaSenha@123;
        TrustServerCertificate=True;
        Encrypt=False;

    depends_on:
      sqlserver:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - onibusexpress-network

  sqlserver:
    container_name: onibusexpress-sqlserver

    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SuaSenha@123"
      MSSQL_PID: "Developer"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver-data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SuaSenha@123' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

    restart: unless-stopped

    networks:
      - onibusexpress-network

volumes:
  sqlserver-data:

networks:
  onibusexpress-network: